{% extends 'blog.html' %}
{% load static %}
{% block content %}
<!-- Hero -->
<section class="blog-detail-hero">
  <div class="blog-detail-thumb">🚀</div>
  <div class="blog-detail-hero-overlay">
    <div class="container">
      <div class="breadcrumb-custom">
        <a href="{% url 'home' %}">خانه</a> /
        <a href="{% url 'blog' %}">بلاگ</a> / {{ blog.title }}
      </div>
      <span class="post-category-badge">{{categories.name}}</span>
      <h1 class="blog-detail-title">
        {{ blog.title }}
      </h1>
      <div class="blog-detail-meta">
        <span>👨‍💻 {{blog.writer}}</span>
        <span>📅 {{blog.date}}</span>
        <span>👁 {{blog.views}} بازدید</span>
      </div>
    </div>
  </div>
</section>

<!-- Content -->
<section class="blog-detail-section">
  <div class="container">
    <div class="blog-detail-content">
      <p>
        {{details.content}}
      </p>

      <!-- Tags -->
      <div class="blog-detail-tags">
        <span class="post-tag-detail">{{blog.tag}}</span>
      </div>

      <!-- Nav -->
      <div class="post-navigation">
        <a href="#" class="post-nav-btn">← مقاله قبلی</a>
        <a href="{% url 'blog' %}" class="post-nav-btn back-btn"
          >بازگشت به بلاگ</a
        >
        <a href="#" class="post-nav-btn">مقاله بعدی →</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
