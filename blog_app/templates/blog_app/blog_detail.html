{% extends 'base.html' %}
{% load static %}
{% block content %}
<!-- Hero -->
<section class="blog-detail-hero">
  <div class="blog-detail-thumb">
    {% if blog.image %}
      <img src="{{ blog.image.url }}" alt="{{ blog.title }}" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;">
    {% else %}
      <img src="{% static 'img/default.png' %}" alt="default" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;">
    {% endif %}
  </div>
  <div class="blog-detail-hero-overlay">
    <div class="container">
      <div class="breadcrumb-custom">
        <a href="{% url 'home' %}">خانه</a> /
        <a href="{% url 'blog' %}">بلاگ</a> / {{ blog.title }}
      </div>
      <span class="post-category-badge">{{categories.name}}</span>
      <h1 class="blog-detail-title">
        {{ blog.title }}
      </h1>
      <div class="blog-detail-meta">
        <span>👨‍💻 {{blog.writer}}</span>
        <span>📅 {{blog.date}}</span>
        <span>👁 {{blog.views}} بازدید</span>
      </div>
    </div>
  </div>
</section>

<!-- Content -->
<section class="blog-detail-section">
  <div class="container">
    <div class="blog-detail-content">
      <p>
        {{detail.content}}
      </p>

      <!-- Tags -->
      <div class="blog-detail-tags">
        <span class="post-tag-detail">{{blog.tag}}</span>
      </div>
    </div>
  </div>
</section>
{% endblock %}
