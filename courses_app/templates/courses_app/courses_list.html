{% extends 'base.html' %}
{% load static %}
{% block content %}
<!-- Courses -->
<section id="courses" class="py-5">
  
  <div class="container">
    <!--<div class="text-center mb-4">
      <h2 class="section-title">دوره ها</h2>
    </div> -->
    
    <div class="row g-4">

      {% for course in courses %}
      <div class="col-12 col-md-6 col-lg-4">
        
        <div class="card course-card">
          <div class="card-img-placeholder" style="background: linear-gradient(135deg, #667eea, #764ba2);"></div>
          {% if course.image %}
            <img src="{{ course.image.url }}" alt="{{ course.title }}">
          {% else %}
            <img src="{% static 'img/default.png' %}" alt="default">
          {% endif %}
          <div class="card-body d-flex flex-column">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <span class="badge-level badge-beginner">{{course.level}}</span>
              <span class="course-meta">⏱{{course.duration_hours}}</span>
            </div>
            <h5 class="card-title fw-bold">{{course.title}}</h5>
            <p class="card-text text-muted small flex-grow-1">{{course.description}}</p>
            <div class="d-flex justify-content-between align-items-center mt-2">
              <span class="course-meta">👨‍🏫{{course.instructor}}</span>
              <span class="card-price">{{course.price}} تومان</span>
            </div>
            <button class="btn-enroll mt-3">به زودی...</button>
          </div>
        </div>
        
      </div>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
